 <!-- register.html -->

<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Criar Usuário</title>

  <link rel="shortcut icon" href="sergio1.png" type="image/png">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{

      min-height:100vh;

      display:flex;

      justify-content:center;

      align-items:center;

      background:
      linear-gradient(
        135deg,
        #0a0a0a,
        #111827,
        #0f172a
      );
    }

    .card{

      width:420px;

      padding:35px;

      border-radius:20px;

      background:#161616;

      border:1px solid #2a2a2a;

      box-shadow:
      0 10px 40px rgba(0,0,0,0.5);
    }

    .logo{

      width:90px;

      display:block;

      margin:auto;

      margin-bottom:20px;
    }

    h2{

      color:white;

      text-align:center;

      margin-bottom:25px;
    }

    label{

      display:block;

      color:#cfcfcf;

      margin-bottom:6px;

      margin-top:15px;
    }

    input{

      width:100%;

      padding:12px;

      border:none;

      border-radius:10px;

      background:#242424;

      color:white;
    }

    input:focus{

      outline:none;

      border:1px solid #2563eb;
    }

    button{

      width:100%;

      margin-top:20px;

      padding:12px;

      border:none;

      border-radius:10px;

      background:#2563eb;

      color:white;

      font-size:16px;

      cursor:pointer;

      transition:0.3s;
    }

    button:hover{

      background:#1d4ed8;
    }

    .msg{

      margin-top:15px;

      text-align:center;

      color:#cfcfcf;
    }

    .voltar{

      display:block;

      text-align:center;

      margin-top:20px;

      color:#60a5fa;

      text-decoration:none;
    }

    .voltar:hover{

      text-decoration:underline;
    }

  </style>

</head>

<body>

  <div class="card">

    <img
      src="sergio.png"
      alt="Logo"
      class="logo"
    >

    <h2>Criar Usuário</h2>

    <form id="registerForm">

      <label>Email</label>

      <input
        id="email"
        type="email"
        required
      >

      <label>Senha</label>

      <input
        id="password"
        type="password"
        required
      >

      <button type="submit">
        Salvar Usuário
      </button>

    </form>

    <p class="msg" id="msg"></p>

    <a
      href="login.html"
      class="voltar"
    >
      ← Voltar para Login
    </a>

  </div>

  <script src="register.js"></script>

</body>

</html>
